const db = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: options.prefer || "return=representation",

  });

  return text ? JSON.parse(text) : null;

const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_SHORT  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function getWeekDates(anchor) {
  const d = new Date(anchor);
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((d.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{
    const dd = new Date(mon);
    dd.setDate(mon.getDate()+i);
    return dd;
  });
}

// ─── PHASE COLUMN MAP ────────────────────────────────────────────────────────
const PHASE_PREFIX = {
  "Phase 1":        "p1",
  "Phase 2 Bridge": "p2b",
  "Phase 2 - Build":"p2",
  "Phase 3 - Peak": "p3",
  "Pre-Race Taper": "taper",
};

function getPrescription(workout, phase) {
  const prefix = PHASE_PREFIX[phase] || "p1";
  const sets = workout[`${prefix}_sets`];
  const reps = workout[`${prefix}_reps`];
  const load = workout[`${prefix}_load`];
  const tempo = workout[`${prefix}_tempo`];
  if (!sets && !reps) {
    // fallback to p1
    return {
      sets: workout.p1_sets,
      reps: workout.p1_reps,
      load: workout.p1_load,
      tempo: workout.p1_tempo,
    };
  }
  return { sets, reps, load, tempo };
}

function formatPrescription(rx) {
  if (!rx.sets && !rx.reps) return "See notes";
  const sets = rx.sets ? `${rx.sets}×` : "";
  const reps = rx.reps || "";
  const load = rx.load ? ` · ${rx.load}` : "";
  return `${sets}${reps}${load}`;
}

function secsToMMSS(s) {
  if (!s) return "—";
  const m = Math.floor(s/60);
  const sec = s%60;
  return `${m}:${String(sec).padStart(2,"0")}`;
}

function secsToHMM(s) {
  if (!s) return "—";
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  return `${h}:${String(m).padStart(2,"0")}`;
}

function formatTime(s) {
  if (!s) return "—";
  if (s >= 60) {
    const m = Math.floor(s/60);
    const sec = s%60;
    return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
  }
  return `${s}s`;
}

function daysUntil(dateStr) {
  const target = new Date(dateStr+"T12:00:00");
  const today  = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((target-today)/(1000*60*60*24));
}

async function fetchOrCreateSession(dateStr, dayName, sessionName, phase, redDay) {
  const existing = await db(
    `sessions?logged_date=eq.${dateStr}&session_name=eq.${encodeURIComponent(sessionName)}&select=*&limit=1`
  );
  if (existing?.length) return existing[0];
  const created = await db(`sessions`, {
    method: "POST",
    body: JSON.stringify({
      logged_date: dateStr,
      day_of_week: dayName,
      session_name: sessionName,
      phase,
      red_day: redDay,
    }),
  });
  return Array.isArray(created) ? created[0] : created;
}

}

async function completeSession(sessionId, durationMins, overallRpe, notes) {
  return db(`sessions?id=eq.${sessionId}`, {
    method:"PATCH",
    body: JSON.stringify({
      actual_duration_minutes: durationMins ? parseInt(durationMins) : null,
      overall_rpe: overallRpe ? parseInt(overallRpe) : null,
      notes: notes || null,
      completed_at: new Date().toISOString(),
    }),
    prefer:"return=minimal",
  });
}

async function logHrv(date, hrv, hr, sleep, energy, notes, threshold) {
  const existing = await db(`hrv?date=eq.${date}&select=id&limit=1`);
  // calculate 7-day avg
  const recent = await db(`hrv?date=lt.${date}&select=morning_hrv&order=date.desc&limit=7`) || [];
  const vals = recent.map(r=>r.morning_hrv).filter(Boolean);
  const avg7 = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : hrv;
  const redDay = hrv < avg7*(1-(threshold||8)/100);

  const payload = {
    date, morning_hrv:parseInt(hrv), resting_hr:hr?parseInt(hr):null,
    sleep_hours:sleep?parseFloat(sleep):null, energy_level:energy?parseInt(energy):null,
    notes:notes||null, red_day:redDay,
  };

  if (existing?.length) {
    await db(`hrv?id=eq.${existing[0].id}`, {
      method:"PATCH", body:JSON.stringify(payload), prefer:"return=minimal"
    });
  } else {
    await db(`hrv`, { method:"POST", body:JSON.stringify(payload) });
  }
  return { redDay, avg7: Math.round(avg7) };
}

async function fetchAllResults() {
  return await db(
    `results?select=*,workouts(exercises(name),session_name),sessions(logged_date,session_name)&order=logged_at.desc&limit=300`

}

async function fetchBests() {
  const results = await db(
    `results?select=*,workouts(exercises(name,category)),sessions(logged_date)&order=logged_at.desc`
  ) || [];
  const bests = {};
  for (const r of results) {
    const name = r.workouts?.exercises?.name;
    if (!name) continue;
    if (!bests[name]) bests[name] = {
      name,
      category: r.workouts?.exercises?.category,
      maxWeight: null, maxWeightDate: null,
      maxReps: null, maxRepsDate: null,
      maxTime: null, maxTimeDate: null,
    };
    const date = r.sessions?.logged_date || null;
    if (r.weight_lbs && (!bests[name].maxWeight || r.weight_lbs > bests[name].maxWeight)) {
      bests[name].maxWeight = r.weight_lbs;
      bests[name].maxWeightDate = date;
    }
    if (r.reps_completed && (!bests[name].maxReps || r.reps_completed > bests[name].maxReps)) {
      bests[name].maxReps = r.reps_completed;
      bests[name].maxRepsDate = date;
    }
    if (r.duration_seconds && (!bests[name].maxTime || r.duration_seconds > bests[name].maxTime)) {
      bests[name].maxTime = r.duration_seconds;
      bests[name].maxTimeDate = date;
    }
  }
  return Object.values(bests);
}

// Shared input helper
function LogInput({ label, value, onChange, type="number", inputMode="numeric", placeholder="—", locked, wide }) {
  return (
    <div className={`log-field${wide?" log-field-wide":""}`}>
      <div className="log-field-label">{label}</div>
      <input
        className={`log-field-input${locked?" locked":""}`}
        type={type} inputMode={inputMode} placeholder={placeholder}
        value={value} readOnly={locked}
        onChange={e=>onChange(e.target.value)}
      />
    </div>
  );
}

// Per-type form renderers — each returns { fields JSX, summary string, savePayload fn }
function useSetForm(resultType, existingResult) {
  const ex = existingResult || {};
  const init = () => {
    switch(resultType) {
      case "weighted_reps":   return { reps:ex.reps_completed?String(ex.reps_completed):"", weight:ex.weight_lbs?String(ex.weight_lbs):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "bodyweight_reps": return { reps:ex.reps_completed?String(ex.reps_completed):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "timed_hold":      return { time:ex.duration_seconds?String(ex.duration_seconds):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "bilateral_timed": return { left:ex.duration_seconds?String(ex.duration_seconds):"", right:"", rpe:ex.rpe?String(ex.rpe):"" };
      case "distance_carry":  return { distance:ex.reps_completed?String(ex.reps_completed):"", weight:ex.weight_lbs?String(ex.weight_lbs):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "stair_climb":    return { stories:ex.reps_completed?String(ex.reps_completed):"", mins:ex.duration_seconds?String(Math.floor(ex.duration_seconds/60)):"", secs:ex.duration_seconds?String(ex.duration_seconds%60):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "cardio_time":     return { mins:ex.duration_seconds?String(Math.floor(ex.duration_seconds/60)):"", secs:ex.duration_seconds?String(ex.duration_seconds%60):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "ruck":            return { hrs:ex.duration_seconds?String(Math.floor(ex.duration_seconds/3600)):"", mins:ex.duration_seconds?String(Math.floor((ex.duration_seconds%3600)/60)):"", weight:ex.weight_lbs?String(ex.weight_lbs):"", rpe:ex.rpe?String(ex.rpe):"" };
      case "mobility":        return { done: !!ex.reps_completed };
      default:                return { reps:"", weight:"", rpe:"" };
    }
  };
  const [data, setData] = useState(init);
  const set = (k,v) => setData(d=>({...d,[k]:v}));

  const toPayload = () => {
    switch(resultType) {
      case "weighted_reps":   return { reps_completed:data.reps?parseInt(data.reps):null, weight_lbs:data.weight?parseFloat(data.weight):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "bodyweight_reps": return { reps_completed:data.reps?parseInt(data.reps):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "timed_hold":      return { duration_seconds:data.time?parseInt(data.time):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "bilateral_timed": return { duration_seconds:data.left?parseInt(data.left):null, weight_lbs:data.right?parseFloat(data.right):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "distance_carry":  return { reps_completed:data.distance?parseInt(data.distance):null, weight_lbs:data.weight?parseFloat(data.weight):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "stair_climb":     return { reps_completed:data.stories?parseInt(data.stories):null, duration_seconds:(parseInt(data.mins||0)*60)+parseInt(data.secs||0)||null, rpe:data.rpe?parseInt(data.rpe):null };
      case "cardio_time":     return { duration_seconds:(parseInt(data.mins||0)*60)+parseInt(data.secs||0)||null, rpe:data.rpe?parseInt(data.rpe):null };
      case "ruck":            return { duration_seconds:(parseInt(data.hrs||0)*3600)+(parseInt(data.mins||0)*60)||null, weight_lbs:data.weight?parseFloat(data.weight):null, rpe:data.rpe?parseInt(data.rpe):null };
      case "mobility":        return { reps_completed: data.done?1:0 };
      default:                return {};
    }
  };

  const summary = () => {
    switch(resultType) {
      case "weighted_reps":   return [data.reps&&`${data.reps} reps`, data.weight&&`${data.weight} lb`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "bodyweight_reps": return [data.reps&&`${data.reps} reps`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "timed_hold":      return [data.time&&`${data.time}s`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "bilateral_timed": return [data.left&&`L ${data.left}s`, data.right&&`R ${data.right}s`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "distance_carry":  return [data.distance&&`${data.distance}m`, data.weight&&`${data.weight} lb`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "stair_climb":     return [data.stories&&`${data.stories} stories`, data.mins&&`${data.mins}:${String(data.secs||0).padStart(2,"0")}`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "cardio_time":     return [data.mins&&data.secs!==undefined&&`${data.mins}:${String(data.secs).padStart(2,"0")}`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "ruck":            return [data.hrs&&`${data.hrs}h ${data.mins}m`, data.weight&&`${data.weight} lb`, data.rpe&&`RPE ${data.rpe}`].filter(Boolean).join(" · ");
      case "mobility":        return data.done?"✓ Done":"";
      default:                return "";
    }
  };

  const isEmpty = () => {
    switch(resultType) {
      case "mobility": return false;
      case "weighted_reps": return !data.reps && !data.weight;
      case "bodyweight_reps": return !data.reps;
      case "timed_hold": return !data.time;
      case "bilateral_timed": return !data.left && !data.right;
      case "distance_carry": return !data.distance;
      case "stair_climb": return !data.stories && !data.mins;
      case "cardio_time": return !data.mins && !data.secs;
      case "ruck": return !data.hrs && !data.mins;
      default: return true;
    }
  };

  return { data, set, toPayload, summary, isEmpty };
}

function SetForm({ resultType, data, set, locked }) {

    <LogInput label={label} value={data[key]||""} onChange={v=>set(key,v)}

        className={`log-mobility-btn${data.done?" done":""}`}

// Single set log entry with confirm
function SetEntry({ setNum, resultType, existingResult, sessionId, workoutId, onConfirmed, isMobility }) {
  const { data, set, toPayload, summary, isEmpty } = useSetForm(resultType, existingResult);
  const [confirmed, setConfirmed] = useState(!!existingResult);
  const [saving, setSaving] = useState(false);

  const handleConfirm = async () => {
    if (confirmed) { setConfirmed(false); return; }
    if (!sessionId) return;
    setSaving(true);
    try {
      const payload = toPayload();
      await saveResult(sessionId, workoutId, setNum, payload.reps_completed, payload.weight_lbs, payload.duration_seconds, payload.rpe);
      setConfirmed(true);
      onConfirmed();
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  if (isMobility) return (
    <div className="mobility-entry">
      <SetForm resultType="mobility" data={data} set={set} locked={confirmed}/>
      {!confirmed && (
        <button className="btn btn-primary" style={{width:"100%",marginTop:8,padding:"12px"}}
          onClick={handleConfirm} disabled={saving}>
          {saving?"Saving...":"Save"}
        </button>
      )}
      {confirmed && <div className="set-confirmed-bar">✓ Logged</div>}
    </div>
  );

  return (
    <div className={`set-entry${confirmed?" confirmed":""}`}>
      <div className="set-entry-header">
        <div className="set-entry-num">Set {setNum}</div>
        {confirmed && <div className="set-entry-summary">{summary()}</div>}
        <button className={`set-entry-btn${confirmed?" confirmed":""}`}
          onClick={handleConfirm} disabled={saving}>
          {saving?"...":confirmed?"✓ Done":"Log"}
        </button>
      </div>
      {!confirmed && (
        <SetForm resultType={resultType} data={data} set={set} locked={false}/>
      )}
    </div>
  );
}

function ExerciseCard({ workout, index, phase, redDay, sessionId, existingResults, onComplete }) {
  const exercise = workout.exercises || {};
  const rx = getPrescription(workout, phase);
  const numSets = rx.sets || (exercise.result_type==="mobility"?1:3);
  const resultType = exercise.result_type || "weighted_reps";
  const isMobility = resultType==="mobility";

  const [open, setOpen] = useState(false);
  const [confirmedSets, setConfirmedSets] = useState(()=>{
    const s = new Set();
    existingResults.filter(r=>r.workout_id===workout.id).forEach(r=>s.add(r.set_number));
    return s;
  });

  const handleSetConfirmed = useCallback((setNum)=>{
    setConfirmedSets(prev=>{
      const next = new Set([...prev, setNum]);
      if (next.size>=numSets) onComplete(workout.id);
      return next;
    });
  },[numSets, workout.id, onComplete]);

  const allDone = confirmedSets.size>=numSets;
  const showRedMod = redDay && workout.hrv_modification && workout.hrv_modification!=="Always perform";

  const statusLabel = ()=>{
    if (allDone) return "✓ Done";
    if (isMobility) return confirmedSets.size>0?"✓ Done":"Tap";
    return confirmedSets.size>0?`${confirmedSets.size}/${numSets}`:rx.sets?`${rx.sets} sets`:"Log";
  };

  return (
    <div className={`ex-card${open?" open":""}${allDone?" done":""}${showRedMod?" red-day-active":""}`}>
      <div className="ex-header" onClick={()=>setOpen(o=>!o)}>
        <div className="ex-num">{index+1}</div>
        <div className="ex-info">
          <div className="ex-name">{exercise.name||workout.notes}</div>
          <div className="ex-rx">{formatPrescription(rx)}</div>
        </div>
        <div className="ex-status">{statusLabel()}</div>
      </div>

      {open && <>
        <div className="sets-divider" style={{margin:"0 12px"}}/>
        {showRedMod && <div className="hrv-mod-note">🔴 Red day: {workout.hrv_modification}</div>}
        {exercise.coaching_notes && <div className="coaching-note">💡 {exercise.coaching_notes}</div>}
        {rx.tempo && <div className="tempo-note">⏱ {rx.tempo}</div>}

        <div className="sets-log-wrap">
          {Array.from({length:numSets},(_,i)=>{
            const setNum = i+1;
            const existing = existingResults.find(r=>r.workout_id===workout.id&&r.set_number===setNum);
            return (
              <SetEntry key={setNum} setNum={setNum} resultType={resultType}
                existingResult={existing} sessionId={sessionId} workoutId={workout.id}
                onConfirmed={()=>handleSetConfirmed(setNum)} isMobility={isMobility}/>
            );
          })}
        </div>

        <div className="note-wrap">
          <textarea className="note-input" rows={2} placeholder="Notes..."/>
        </div>
      </>}
    </div>
  );
}

async function fetchHistoryByExercise() {
  const results = await db(
    `results?select=*,workouts(exercises(name,category,result_type)),sessions(logged_date,session_name)&order=logged_at.asc&limit=500`
  ) || [];

  // Group by exercise name
  const byExercise = {};
  for (const r of results) {
    const name = r.workouts?.exercises?.name;
    const category = r.workouts?.exercises?.category;
    const resultType = r.workouts?.exercises?.result_type || "weighted_reps";
    if (!name) continue;
    if (!byExercise[name]) byExercise[name] = { name, category, resultType, sessions: {} };
    const date = r.sessions?.logged_date || "?";
    if (!byExercise[name].sessions[date]) byExercise[name].sessions[date] = [];
    byExercise[name].sessions[date].push(r);
  }

  // Convert sessions to sorted array per exercise — most recent first
  return Object.values(byExercise).map(ex => ({
    ...ex,
    sessions: Object.entries(ex.sessions)
      .sort(([a],[b]) => b.localeCompare(a))
      .map(([date, sets]) => ({
        date,
        sets: sets.sort((a,b) => a.set_number - b.set_number),
      })),
  })).sort((a,b) => a.name.localeCompare(b.name));
}

function formatSetSummary(set, resultType) {
  const parts = [];
  switch(resultType) {
    case "weighted_reps":
      if (set.reps_completed) parts.push(`${set.reps_completed} reps`);
      if (set.weight_lbs) parts.push(`${set.weight_lbs} lb`);
      break;
    case "bodyweight_reps":
      if (set.reps_completed) parts.push(`${set.reps_completed} reps`);
      break;
    case "timed_hold":
      if (set.duration_seconds) parts.push(formatTime(set.duration_seconds));
      break;
    case "bilateral_timed":
      if (set.duration_seconds) parts.push(`L ${formatTime(set.duration_seconds)}`);
      if (set.weight_lbs) parts.push(`R ${formatTime(Math.round(set.weight_lbs))}`);
      break;
    case "distance_carry":
      if (set.reps_completed) parts.push(`${set.reps_completed}m`);
      if (set.weight_lbs) parts.push(`${set.weight_lbs} lb`);
      break;
    case "stair_climb":
      if (set.reps_completed) parts.push(`${set.reps_completed} stories`);
      if (set.duration_seconds) parts.push(secsToMMSS(set.duration_seconds));
      break;
    case "cardio_time":
      if (set.duration_seconds) parts.push(secsToMMSS(set.duration_seconds));
      break;
    case "ruck":
      if (set.duration_seconds) parts.push(secsToHMM(set.duration_seconds));
      if (set.weight_lbs) parts.push(`${set.weight_lbs} lb pack`);
      break;
    case "mobility":
      return "✓ Done";
    default:
      // Fallback — show whatever data exists
      if (set.reps_completed) parts.push(`${set.reps_completed} reps`);
      if (set.weight_lbs) parts.push(`${set.weight_lbs} lb`);
      if (set.duration_seconds) parts.push(formatTime(set.duration_seconds));
  }
  if (set.rpe) parts.push(`RPE ${set.rpe}`);
  return parts.join(" · ") || "Logged";
}

function getBestForSession(sets, resultType) {
  if (!sets.length) return null;
  if (resultType === "weighted_reps") {
    const best = sets.reduce((a,b) => (b.weight_lbs||0) > (a.weight_lbs||0) ? b : a);
    return best.weight_lbs ? `${best.weight_lbs} lb` : null;
  }
  if (resultType === "timed_hold") {
    const best = sets.reduce((a,b) => (b.duration_seconds||0) > (a.duration_seconds||0) ? b : a);
    return best.duration_seconds ? formatTime(best.duration_seconds) : null;
  }
  if (resultType === "stair_climb") {
    const best = sets.reduce((a,b) => (b.reps_completed||0) > (a.reps_completed||0) ? b : a);
    const parts = [];
    if (best.reps_completed) parts.push(`${best.reps_completed} stories`);
    if (best.duration_seconds) parts.push(secsToMMSS(best.duration_seconds));
    return parts.join(" · ") || null;
  }
  if (resultType === "cardio_time") {
    const best = sets.reduce((a,b) => (b.duration_seconds||0) > (a.duration_seconds||0) ? b : a);
    return best.duration_seconds ? secsToMMSS(best.duration_seconds) : null;
  }
  if (resultType === "bodyweight_reps") {
    const best = sets.reduce((a,b) => (b.reps_completed||0) > (a.reps_completed||0) ? b : a);
    return best.reps_completed ? `${best.reps_completed} reps` : null;
  }
  return null;
}

  return (
    <div className="content">
      <div className="filter-row" style={{marginBottom:8}}>
        {cats.map(c=>(
          <button key={c} className={`filter-pill${filter===c?" active":""}`} onClick={()=>setFilter(c)}>{c}</button>
        ))}
      </div>

      <div style={{marginBottom:8}}>
        <input
          className="hist-search"
          type="text"
          placeholder="Search exercises..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
      </div>

      {loading && <div className="center-msg"><div className="spinner"/><div className="center-sub">Loading history...</div></div>}

      {!loading && filtered.length===0 && (
        <div className="center-msg">
          <div className="center-icon">📋</div>
          <div className="center-title">No history yet</div>
          <div className="center-sub">Log workouts to see your progression here.</div>
        </div>
      )}

      {!loading && filtered.map(ex=>(
        <ExerciseHistoryCard key={ex.name} exercise={ex}/>
      ))}
    </div>
  );
}

// ─── RACES TAB ───────────────────────────────────────────────────────────────

function RacesTab({ races }) {
  const upcoming = races.filter(r=>!r.dns && !r.dnf && daysUntil(r.race_date)>0)
    .sort((a,b)=>new Date(a.race_date)-new Date(b.race_date));
  const past = races.filter(r=>r.dns||r.dnf||daysUntil(r.race_date)<=0)
    .sort((a,b)=>new Date(b.race_date)-new Date(a.race_date));

  const typeClass = t=>t==="anchor"?"race-type-anchor":t==="target"?"race-type-target":"race-type-training";
  const typeLabel = t=>t==="anchor"?"A Race":t==="target"?"B Race":"Training";

  return (
    <div className="content">
      {upcoming.length>0 && <>
        <div className="section-title">Upcoming</div>
        {upcoming.map(r=>{
          const days = daysUntil(r.race_date);
          return (
            <div className="race-card" key={r.id}>
              <div>
                <div className="race-name">{r.name}</div>
                <div className="race-meta">
                  {new Date(r.race_date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
                  {r.distance_miles ? ` · ${r.distance_miles} mi` : ""}
                </div>
                <div className={`race-type-pill ${typeClass(r.race_type)}`}>{typeLabel(r.race_type)}</div>
              </div>
              <div className="race-countdown">
                <div className="race-days">{days}</div>
                <div className="race-days-label">days out</div>
              </div>
            </div>
          );
        })}
      </>}
      {past.length>0 && <>
        <div className="section-title" style={{marginTop:8}}>Past</div>
        {past.map(r=>(
          <div className="race-card" key={r.id} style={{opacity:.6}}>
            <div>
              <div className="race-name">{r.name}</div>
              <div className="race-meta">
                {new Date(r.race_date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
                {r.distance_miles?` · ${r.distance_miles} mi`:""}
              </div>
              {r.result_time_seconds && <div className="race-meta" style={{marginTop:2,fontWeight:600}}>
                {secsToHMM(r.result_time_seconds)}
              </div>}
            </div>
            <div className={`race-type-pill ${typeClass(r.race_type)}`}>{typeLabel(r.race_type)}</div>
          </div>
        ))}
      </>}
    </div>
  );
}

// ─── HRV TAB ─────────────────────────────────────────────────────────────────

function HRVTab({ appState, onHrvSaved }) {
  const { settings } = appState;
  const today = toDateStr(new Date());
  const [form,setForm] = useState({hrv:"",hr:"",sleep:"",energy:"",notes:""});
  const [saving,setSaving] = useState(false);
  const [toast,setToast] = useState(null);
  const [history,setHistory] = useState([]);
  const [loadingHistory,setLoadingHistory] = useState(true);
  const [result,setResult] = useState(null);

  const setF = (k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    db(`hrv?select=*&order=date.desc&limit=14`)
      .then(r=>setHistory(r||[]))
      .catch(console.error)
      .finally(()=>setLoadingHistory(false));
  },[]);

  const handleSave = async () => {
    if (!form.hrv) return;
    setSaving(true);
    try {
      const res = await logHrv(today, form.hrv, form.hr, form.sleep, form.energy, form.notes, settings.hrv_red_day_threshold_pct);
      setResult(res);
      setToast(res.redDay?"🔴 Red day flagged":"✅ HRV logged — Green day");
      setTimeout(()=>setToast(null),2500);
      onHrvSaved();
      const h = await db(`hrv?select=*&order=date.desc&limit=14`);
      setHistory(h||[]);
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  const avg7 = ()=>{
    const vals = history.slice(0,7).map(r=>r.morning_hrv).filter(Boolean);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
  };

  return (
    <div className="content">
      <div className="hrv-card">
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:10}}>Log Today's HRV</div>
        {result && (
          <div style={{padding:"8px 10px",borderRadius:8,marginBottom:10,background:result.redDay?"var(--red-bg)":"var(--green-bg)",color:result.redDay?"var(--red)":"var(--green)",fontSize:12,fontWeight:600}}>
            {result.redDay?`🔴 Red day — HRV ${form.hrv} is more than ${settings.hrv_red_day_threshold_pct}% below 7-day avg of ${result.avg7}`:`✓ Green day — HRV ${form.hrv} vs 7-day avg ${result.avg7}`}
          </div>
        )}
        <div className="hrv-form-row">
          <div className="hrv-field">
            <div className="hrv-label">Morning HRV</div>
            <input className="hrv-input" type="number" inputMode="numeric" placeholder="e.g. 62"
              value={form.hrv} onChange={e=>setF("hrv",e.target.value)}/>
          </div>
          <div className="hrv-field">
            <div className="hrv-label">Resting HR</div>
            <input className="hrv-input" type="number" inputMode="numeric" placeholder="e.g. 48"
              value={form.hr} onChange={e=>setF("hr",e.target.value)}/>
          </div>
        </div>
        <div className="hrv-form-row">
          <div className="hrv-field">
            <div className="hrv-label">Sleep (hrs)</div>
            <input className="hrv-input" type="number" inputMode="decimal" placeholder="e.g. 7.5"
              value={form.sleep} onChange={e=>setF("sleep",e.target.value)}/>
          </div>
          <div className="hrv-field">
            <div className="hrv-label">Energy (1–5)</div>
            <input className="hrv-input" type="number" inputMode="numeric" placeholder="e.g. 3"
              value={form.energy} onChange={e=>setF("energy",e.target.value)}/>
          </div>
        </div>
        <div className="hrv-field" style={{marginBottom:10}}>
          <div className="hrv-label">Notes</div>
          <textarea className="hrv-input note-input" rows={2} style={{resize:"none"}}
            placeholder="Sleep quality, stress, travel, alcohol..."
            value={form.notes} onChange={e=>setF("notes",e.target.value)}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",padding:"12px"}} onClick={handleSave} disabled={saving||!form.hrv}>
          {saving?"Saving...":"Log HRV"}
        </button>
      </div>

      {avg7() && (
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:"var(--text2)"}}>7-day average</div>
          <div style={{fontSize:20,fontWeight:800,color:"var(--text)"}}>{avg7()}</div>
        </div>
      )}

      {!loadingHistory && history.length>0 && (
        <div className="hrv-card">
          <div style={{fontSize:12,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Recent</div>
          {history.map(r=>(
            <div className="hrv-history-row" key={r.id}>
              <span className="hrv-history-date">
                {new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
              </span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="hrv-history-val">{r.morning_hrv}</span>
                {r.resting_hr && <span style={{fontSize:11,color:"var(--muted)"}}>{r.resting_hr} bpm</span>}
                {r.sleep_hours && <span style={{fontSize:11,color:"var(--muted)"}}>{r.sleep_hours}h sleep</span>}
                <span className={r.red_day?"hrv-red-chip":"hrv-green-chip"}>{r.red_day?"RED":"OK"}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ─── BENCHMARKS TAB ──────────────────────────────────────────────────────────

function BenchmarkCard({ bm, results, onSaved }) {
  const [open,setOpen] = useState(false);
  const [logging,setLogging] = useState(false);
  const [saving,setSaving] = useState(false);
  const [toast,setToast] = useState(null);
  const latest = results[0]||null;

  const emptyForm = ()=>({
    tested_date:toDateStr(new Date()), phase:"Phase 1", notes:"",
    b1_time_seconds:"", b1_load:"Bodyweight",
    b2_reps:"", b2_load_lbs:"",
    b3_mins:"", b3_secs:"", b3_nasal_transition:"",
    b4_left_seconds:"", b4_right_seconds:"", b4_load:"Bodyweight",
    b5_hrs:"", b5_mins:"", b5_ruck_weight_lbs:"30", b5_rounds:"5", b5_footwear:"",
    b6_hrs:"", b6_mins:"", b6_ruck_weight_lbs:"30", b6_temp_conditions:"", b6_gi_notes:"",
  });
  const [form,setForm] = useState(emptyForm);
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));

  const handleSave = async () => {
    setSaving(true);
    try {
      const payload = { benchmark_number:bm.num, tested_date:form.tested_date, phase:form.phase, notes:form.notes||null };
      if (bm.num===1) { payload.b1_time_seconds=form.b1_time_seconds?parseInt(form.b1_time_seconds):null; payload.b1_load=form.b1_load||null; }
      if (bm.num===2) { payload.b2_reps=form.b2_reps?parseInt(form.b2_reps):null; payload.b2_load_lbs=form.b2_load_lbs?parseFloat(form.b2_load_lbs):null; }
      if (bm.num===3) { payload.b3_time_seconds=(parseInt(form.b3_mins||0)*60)+parseInt(form.b3_secs||0)||null; payload.b3_nasal_transition=form.b3_nasal_transition||null; }
      if (bm.num===4) {
        const l=parseInt(form.b4_left_seconds)||null, r=parseInt(form.b4_right_seconds)||null;
        payload.b4_left_seconds=l; payload.b4_right_seconds=r;
        if (l&&r) payload.b4_asymmetry_pct=parseFloat(((Math.abs(l-r)/Math.max(l,r))*100).toFixed(1));
        payload.b4_load=form.b4_load||null;
      }
      if (bm.num===5) { payload.b5_time_seconds=(parseInt(form.b5_hrs||0)*3600)+(parseInt(form.b5_mins||0)*60)||null; payload.b5_ruck_weight_lbs=parseInt(form.b5_ruck_weight_lbs)||null; payload.b5_rounds=parseInt(form.b5_rounds)||null; payload.b5_footwear=form.b5_footwear||null; }
      if (bm.num===6) { payload.b6_time_seconds=(parseInt(form.b6_hrs||0)*3600)+(parseInt(form.b6_mins||0)*60)||null; payload.b6_ruck_weight_lbs=parseInt(form.b6_ruck_weight_lbs)||null; payload.b6_temp_conditions=form.b6_temp_conditions||null; payload.b6_gi_notes=form.b6_gi_notes||null; }
      await saveBenchmarkResult(payload);
      setToast("Saved! 🎯"); setTimeout(()=>setToast(null),2000);
      setLogging(false); setForm(emptyForm()); onSaved();
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  const renderLatest = () => {
    if (!latest) return <div className="bm-no-result">No results yet — tap to log</div>;
    const date = new Date(latest.tested_date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    if (bm.num===1) return <div className="bm-result-row"><span className="bm-result-val">{formatTime(latest.b1_time_seconds)}</span><span className="bm-result-meta">{latest.b1_load} · {date}</span></div>;
    if (bm.num===2) return <div className="bm-result-row"><span className="bm-result-val">{latest.b2_reps} reps</span><span className="bm-result-meta">{latest.b2_load_lbs} lb · {date}</span></div>;
    if (bm.num===3) return <div className="bm-result-row"><span className="bm-result-val">{secsToMMSS(latest.b3_time_seconds)}</span><span className="bm-result-meta">2000m · {date}</span></div>;
    if (bm.num===4) return <div className="bm-result-row"><span className="bm-result-val">L {formatTime(latest.b4_left_seconds)} · R {formatTime(latest.b4_right_seconds)}</span><span className="bm-result-meta">{latest.b4_asymmetry_pct}% asym · {date}</span></div>;
    if (bm.num===5) return <div className="bm-result-row"><span className="bm-result-val">{secsToMMSS(latest.b5_time_seconds)}</span><span className="bm-result-meta">{latest.b5_ruck_weight_lbs} lb · {latest.b5_rounds} rounds · {date}</span></div>;
    if (bm.num===6) return <div className="bm-result-row"><span className="bm-result-val">{secsToHMM(latest.b6_time_seconds)}</span><span className="bm-result-meta">{latest.b6_ruck_weight_lbs} lb · {date}</span></div>;
  };

  const inp = (label,key,opts={})=>(
    <div className="bm-field">
      <div className="bm-field-label">{label}</div>
      <input className="bm-field-input" type={opts.type||"number"} inputMode={opts.inputMode||"numeric"}
        placeholder={opts.placeholder||"—"} value={form[key]} onChange={e=>set(key,e.target.value)}/>
    </div>
  );

  const timeField = (label,hKey,mKey)=>(
    <div className="bm-field">
      <div className="bm-field-label">{label}</div>
      <div style={{display:"flex",gap:6}}>
        <input className="bm-field-input" type="number" inputMode="numeric" placeholder="h" value={form[hKey]} onChange={e=>set(hKey,e.target.value)} style={{flex:1}}/>
        <input className="bm-field-input" type="number" inputMode="numeric" placeholder="min" value={form[mKey]} onChange={e=>set(mKey,e.target.value)} style={{flex:1}}/>
      </div>
    </div>
  );

  return (
    <div className="bm-card" style={{borderLeftColor:bm.color}}>
      {toast && <div className="toast" style={{bottom:160}}>{toast}</div>}
      <div className="bm-card-header" onClick={()=>!logging&&setOpen(o=>!o)}>
        <div className="bm-num" style={{color:bm.color}}>B{bm.num}</div>
        <div className="bm-info">
          <div className="bm-title">{bm.title}</div>
          <div className="bm-subtitle">{bm.subtitle}</div>
          <div className="bm-day-badge">{bm.day}</div>
        </div>
        {!logging && (
          <button className="bm-log-btn" onClick={e=>{e.stopPropagation();setLogging(true);setOpen(true);}}>+ Log</button>
        )}
      </div>
      {open && (
        <div className="bm-body">
          <div className="bm-divider"/>
          <div className="bm-metric-label">Metric: {bm.metric}</div>
          {renderLatest()}
          {logging ? (
            <div className="bm-form">
              <div className="bm-form-row">
                <div className="bm-field">
                  <div className="bm-field-label">Date</div>
                  <input className="bm-field-input" type="date" value={form.tested_date} onChange={e=>set("tested_date",e.target.value)}/>
                </div>
                <div className="bm-field">
                  <div className="bm-field-label">Phase</div>
                  <select className="bm-field-input" value={form.phase} onChange={e=>set("phase",e.target.value)}>
                    {["Phase 1","Phase 2 Bridge","Phase 2 - Build","Phase 3 - Peak","Pre-Race Taper"].map(p=><option key={p}>{p}</option>)}
                  </select>
                </div>
              </div>
              {bm.num===1 && <div className="bm-form-row">{inp("Hold time (seconds)","b1_time_seconds")}{inp("Load","b1_load",{type:"text",inputMode:"text",placeholder:"Bodyweight"})}</div>}
              {bm.num===2 && <div className="bm-form-row">{inp("Total reps","b2_reps")}{inp("Load (lbs/hand)","b2_load_lbs",{inputMode:"decimal"})}</div>}
              {bm.num===3 && <>
                <div className="bm-form-row">
                  <div className="bm-field">
                    <div className="bm-field-label">Time (mm:ss)</div>
                    <div style={{display:"flex",gap:6}}>
                      <input className="bm-field-input" type="number" inputMode="numeric" placeholder="min" value={form.b3_mins} onChange={e=>set("b3_mins",e.target.value)} style={{flex:1}}/>
                      <input className="bm-field-input" type="number" inputMode="numeric" placeholder="sec" value={form.b3_secs} onChange={e=>set("b3_secs",e.target.value)} style={{flex:1}}/>
                    </div>
                  </div>
                  {inp("Nasal transition","b3_nasal_transition",{type:"text",inputMode:"text",placeholder:"e.g. 500m"})}
                </div>
              </>}
              {bm.num===4 && <>
                <div className="bm-form-row">{inp("Left leg (sec)","b4_left_seconds")}{inp("Right leg (sec)","b4_right_seconds")}</div>
                {form.b4_left_seconds && form.b4_right_seconds && (
                  <div className="bm-asym-preview">
                    Asymmetry: {((Math.abs(parseInt(form.b4_left_seconds)-parseInt(form.b4_right_seconds))/Math.max(parseInt(form.b4_left_seconds),parseInt(form.b4_right_seconds)))*100).toFixed(1)}%
                  </div>
                )}
              </>}
              {bm.num===5 && <>
                <div className="bm-form-row">{timeField("Total time (h/min)","b5_hrs","b5_mins")}{inp("Ruck weight (lbs)","b5_ruck_weight_lbs")}</div>
                <div className="bm-form-row">{inp("Rounds","b5_rounds")}{inp("Footwear","b5_footwear",{type:"text",inputMode:"text",placeholder:"e.g. Topo"})}</div>
              </>}
              {bm.num===6 && <>
                <div className="bm-form-row">{timeField("Total time (h/min)","b6_hrs","b6_mins")}{inp("Ruck weight (lbs)","b6_ruck_weight_lbs")}</div>
                <div className="bm-form-row">{inp("Temp/conditions","b6_temp_conditions",{type:"text",inputMode:"text",placeholder:"e.g. 95°F humid"})}{inp("GI notes","b6_gi_notes",{type:"text",inputMode:"text",placeholder:"Any issues?"})}</div>
              </>}
              <div className="bm-field" style={{marginTop:2}}>
                <div className="bm-field-label">Notes</div>
                <textarea className="bm-field-input" rows={2} placeholder="Optional..." value={form.notes} onChange={e=>set("notes",e.target.value)} style={{resize:"none",lineHeight:1.5}}/>
              </div>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button className="btn btn-ghost" style={{flex:1,padding:"10px"}} onClick={()=>setLogging(false)}>Cancel</button>
                <button className="btn btn-primary" style={{flex:2,padding:"10px"}} onClick={handleSave} disabled={saving}>{saving?"Saving...":"Save Result"}</button>
              </div>
            </div>
          ) : (
            <>
              {results.length>1 && (
                <div style={{marginBottom:10}}>
                  <div className="bm-history-label">History</div>
                  {results.slice(1).map((r,i)=>{
                    const date = new Date(r.tested_date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"});
                    let val="—";
                    if (bm.num===1) val=formatTime(r.b1_time_seconds);
                    if (bm.num===2) val=`${r.b2_reps} reps @ ${r.b2_load_lbs} lb`;
                    if (bm.num===3) val=secsToMMSS(r.b3_time_seconds);
                    if (bm.num===4) val=`L ${formatTime(r.b4_left_seconds)} · R ${formatTime(r.b4_right_seconds)} (${r.b4_asymmetry_pct}%)`;
                    if (bm.num===5) val=secsToMMSS(r.b5_time_seconds);
                    if (bm.num===6) val=secsToHMM(r.b6_time_seconds);
                    return <div className="bm-history-row" key={i}><span className="bm-history-date">{date}</span><span className="bm-history-val">{val}</span></div>;
                  })}
                </div>
              )}
              <div className="bm-targets-label">Phase targets</div>
              {bm.targets.map((t,i)=>(
                <div className="bm-target-row" key={i}>
                  <span className="bm-target-phase">Phase {i+1<=3?i+1:"Race"}</span>
                  <span className="bm-target-val">{t}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function BenchmarksTab() {
  const [loading,setLoading] = useState(true);
  const [results,setResults] = useState([]);

  const load = ()=>{ setLoading(true); fetchBenchmarkResults().then(setResults).catch(console.error).finally(()=>setLoading(false)); };
  useEffect(()=>{ load(); },[]);

  return (
    <div className="content">
      {loading && <div className="center-msg"><div className="spinner"/><div className="center-sub">Loading benchmarks...</div></div>}
      {!loading && BENCHMARKS.map(bm=>(
        <BenchmarkCard key={bm.num} bm={bm}
          results={results.filter(r=>r.benchmark_number===bm.num)}
          onSaved={load}/>
      ))}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const today = new Date();
  const todayStr = toDateStr(today);

  const [tab,setTab] = useState("today");
  const [selectedDate,setSelectedDate] = useState(today);
  const [weekOffset,setWeekOffset] = useState(0);
  const [appState,setAppState] = useState({settings:{current_phase:"Phase 1",hrv_red_day_threshold_pct:8},hrv:null,races:[]});
  const [appLoading,setAppLoading] = useState(true);

  const loadAppState = ()=>{
    fetchAppState().then(s=>setAppState(s)).catch(console.error).finally(()=>setAppLoading(false));
  };

  useEffect(()=>{ loadAppState(); },[]);

  const anchorDate = new Date(today);
  anchorDate.setDate(today.getDate()+weekOffset*7);
  const weekDates = getWeekDates(anchorDate);

  const weekLabel = weekOffset===0?"This Week":weekOffset===-1?"Last Week":weekOffset===1?"Next Week":
    weekDates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"});

  const TABS = [
    {id:"today",icon:"🏋️",label:"Today"},
    {id:"history",icon:"📋",label:"History"},
    {id:"bests",icon:"🏆",label:"Bests"},
    {id:"races",icon:"🏁",label:"Races"},
    {id:"benchmarks",icon:"🎯",label:"Benchmarks"},
  ];

  if (appLoading) return (
    <>
      <style>{css}</style>
      <div className="app"><div className="center-msg" style={{marginTop:80}}><div className="spinner"/><div className="center-sub">Loading...</div></div></div>
    </>
  );

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="week-strip">
          <div className="week-strip-top">
            <div className="week-label">{weekLabel}</div>
            <div className="week-nav">
              <button className="week-nav-btn" onClick={()=>setWeekOffset(o=>o-1)}>‹</button>
              <button className="week-nav-btn" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
            </div>
          </div>
          <div className="days-row">
            {weekDates.map((date,i)=>{
              const dStr = toDateStr(date);
              const isToday = dStr===todayStr;
              const isSelected = dStr===toDateStr(selectedDate);
              return (
                <button key={i} className={`day-btn${isToday?" today":""}${isSelected?" selected":""}`}
                  onClick={()=>{setSelectedDate(date);setTab("today");}}>
                  <div className="day-name">{DAY_SHORT[date.getDay()]}</div>
                  <div className="day-num">{date.getDate()}</div>
                  <div className="day-dot" style={{opacity:isSelected?1:0}}/>
                  {isSelected && <div className="day-active-bar"/>}
                </button>
              );
            })}
          </div>
        </div>

        {tab==="today" && <TodayTab selectedDate={selectedDate} todayDate={todayStr} appState={{...appState, onHrvSaved:loadAppState}}/>}
        {tab==="history" && <HistoryTab/>}
        {tab==="bests" && <BestsTab/>}
        {tab==="races" && <RacesTab races={appState.races}/>}
        {tab==="benchmarks" && <BenchmarksTab/>}

        <div className="bottom-nav">
          {TABS.map(({id,icon,label})=>(
            <button key={id} className={`nav-item${tab===id?" active":""}`} onClick={()=>setTab(id)}>
              <span className="nav-icon">{icon}</span>
              <span className="nav-label">{label}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
