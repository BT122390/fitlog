const db = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: options.prefer || "return=representation",
      ...options.headers,
    },
    ...options,
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

function toDateStr(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

function getWeekDates(anchor) {
  const mon = new Date(anchor);
  mon.setDate(anchor.getDate() - ((anchor.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function daysUntil(dateStr) {
  const target = new Date(dateStr+"T12:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((target-today)/(1000*60*60*24));
}

async function fetchScheduleForDay(dayName) {
  try {
    return await db(`schedule?day_of_week=eq.${dayName}&select=*,exercises(name,coaching_notes)&order=order_in_session.asc`) || [];
  } catch(e) { console.error(e); return []; }
}

async function fetchAllSchedule() {
  return await db(`schedule?select=*,exercises(name)&order=order_in_session.asc`) || [];
}

async function fetchAllExercises() {
  return await db(`exercises?select=id,name&order=name.asc`) || [];
}

async function fetchTodayLog(exerciseId, date) {
  const r = await db(`logs?exercise_id=eq.${exerciseId}&log_date=eq.${date}&select=*&limit=1`);
  return r?.[0] || null;
}

async function fetchLastLog(exerciseId, beforeDate) {
  const r = await db(`logs?exercise_id=eq.${exerciseId}&log_date=lt.${beforeDate}&log_text=neq.&select=*&order=log_date.desc&limit=1`);
  return r?.[0] || null;
}

async function fetchLogsForDate(date) {
  return await db(`logs?log_date=eq.${date}&select=*,exercises(name)&order=created_at.asc`) || [];
}

async function fetchRecentLogs(limit=300) {
  return await db(`logs?select=*,exercises(name)&order=log_date.desc,created_at.desc&limit=${limit}`) || [];
}

async function saveLog(exerciseId, date, text, existingId) {
  if (existingId) {
    return db(`logs?id=eq.${existingId}`, {
      method:"PATCH", body:JSON.stringify({log_text:text, updated_at:new Date().toISOString()}), prefer:"return=minimal"
    });
  } else {
    return db(`logs`, {
      method:"POST", body:JSON.stringify({exercise_id:exerciseId, log_date:date, log_text:text})
    });
  }
}

async function fetchRaces() {
  return await db(`races?order=race_date.asc&select=*`) || [];
}

async function updateScheduleField(id, field, value) {
  return db(`schedule?id=eq.${id}`, { method:"PATCH", body:JSON.stringify({[field]:value}), prefer:"return=minimal" });
}

async function deleteScheduleRow(id) {
  return db(`schedule?id=eq.${id}`, { method:"DELETE", prefer:"return=minimal" });
}

async function moveScheduleRow(id, direction, allForDay) {
  const idx = allForDay.findIndex(w => w.id === id);
  const swapIdx = direction === "up" ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= allForDay.length) return;

  // Reorder the array
  const reordered = [...allForDay];
  const [moved] = reordered.splice(idx, 1);
  reordered.splice(swapIdx, 0, moved);

  // Assign clean sequential order_in_session values (1, 2, 3...)
  await Promise.all(
    reordered.map((row, i) =>
      db(`schedule?id=eq.${row.id}`, {
        method: "PATCH",
        body: JSON.stringify({ order_in_session: i + 1 }),
        prefer: "return=minimal",
      })
    )
  );
}

async function addScheduleRow(dayOfWeek, exerciseId, section, order, prescription) {
  return db(`schedule`, {
    method:"POST",
    body:JSON.stringify({day_of_week:dayOfWeek, exercise_id:exerciseId, section:section||"Main Session", order_in_session:order, prescription:prescription||null})
  });
}

async function fetchHistoryPreview(exerciseId) {
  if (!exerciseId) return [];
  return await db(`logs?exercise_id=eq.${exerciseId}&log_text=neq.&order=log_date.desc&limit=3&select=exercises(name),log_date,log_text`) || [];
}

// ─── EXERCISE ROW ─────────────────────────────────────────────────────────────

function ExerciseRow({ item, date }) {
  // item = schedule row with exercises join, or {id, exercise_id, exercises:{name}, adhoc:true}
  const exercise = item.exercises || {};
  const name = exercise.name || "Exercise";
  const exerciseId = item.exercise_id;
  const prescription = item.prescription || null;
  const coachingNotes = exercise.coaching_notes || null;

  const [open, setOpen] = useState(false);
  const [notesOpen, setNotesOpen] = useState(false);
  const [text, setText] = useState("");
  const [logId, setLogId] = useState(null);
  const [lastLog, setLastLog] = useState(null);
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);

  // Check for existing log on mount (for checkbox state)
  useEffect(() => {
    fetchTodayLog(exerciseId, date).then(log => {
      if (log) { setLogId(log.id); setText(log.log_text); setSaved(!!log.log_text.trim()); }
    }).catch(console.error);
  }, [exerciseId, date]);

  // Load full data when opened
  useEffect(() => {
    if (!open) return;
    Promise.all([fetchTodayLog(exerciseId, date), fetchLastLog(exerciseId, date)])
      .then(([today, last]) => {
        if (today) { setLogId(today.id); setText(today.log_text); setSaved(!!today.log_text.trim()); }
        if (last) setLastLog(last);
      }).catch(console.error);
  }, [open, exerciseId, date]);

  useEffect(() => { setOpen(false); setText(""); setLogId(null); setSaved(false); setLastLog(null); }, [date]);

  const handleLog = async () => {
    if (!text.trim()) return;
    setSaving(true);
    try {
      if (logId) {
        await saveLog(exerciseId, date, text, logId);
      } else {
        const result = await saveLog(exerciseId, date, text, null);
        const row = Array.isArray(result) ? result[0] : result;
        if (row?.id) setLogId(row.id);
      }
      setSaved(true); setOpen(false);
    } catch(e) { console.error(e); }
    setSaving(false);
  };

  return (
    <div className={`ex-row${open?" ex-row-open":""}${saved?" ex-row-saved":""}`}>
      <div className="ex-row-header" onClick={() => setOpen(o => !o)}>
        <div className="ex-row-header-left">
          <div className="ex-row-name">{name}</div>
          {prescription && <div className="ex-row-rx">{prescription}</div>}
        </div>
        <div className="ex-row-header-right">
          <span className={`ex-checkbox${saved?" done":""}`}>
            <span className="ex-checkbox-check">✓</span>
          </span>
        </div>
      </div>

      {open && (
        <div className="ex-row-body">
          {coachingNotes && (
            <div style={{marginBottom:10}}>
              <button className="ex-notes-toggle" onClick={() => setNotesOpen(o=>!o)}>
                <span className={`ex-notes-chevron${notesOpen?" open":""}`}>▶</span>
                Coaching Notes
              </button>
              {notesOpen && <div className="ex-notes-body">{coachingNotes}</div>}
            </div>
          )}
          {lastLog && (
            <div>

// ─── ADD EXERCISE ─────────────────────────────────────────────────────────────

function AddExercise({ date, onAdded }) {
  const [open, setOpen] = useState(false);
  const [allExercises, setAllExercises] = useState([]);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [history, setHistory] = useState([]);
  const [histLoading, setHistLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const debounceRef = useRef(null);

  useEffect(() => {
    if (open && allExercises.length === 0) {
      fetchAllExercises().then(setAllExercises).catch(console.error);
    }
  }, [open]);

  useEffect(() => {
    if (!selected) { setHistory([]); return; }
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      setHistLoading(true);
      fetchHistoryPreview(selected.id)
        .then(setHistory).catch(()=>setHistory([]))
        .finally(()=>setHistLoading(false));
    }, 300);
    return () => clearTimeout(debounceRef.current);
  }, [selected]);

  const filtered = search
    ? allExercises.filter(e => e.name.toLowerCase().includes(search.toLowerCase()))
    : allExercises;

  const handleAdd = async () => {
    if (!selected) return;
    setSaving(true);
    try {
      await saveLog(selected.id, date, "", null);
      setSearch(""); setSelected(null); setOpen(false); setHistory([]);
      onAdded();
    } catch(e) { console.error(e); }
    setSaving(false);
  };

  if (!open) return (
    <button className="add-ex-btn" onClick={() => setOpen(true)}>+ Add exercise</button>
  );

  return (
    <div className="add-ex-form">
      <input
        className="add-ex-input"
        placeholder="Search exercises..."
        value={search}
        onChange={e => { setSearch(e.target.value); setSelected(null); }}
        autoFocus
      />
      {filtered.length > 0 && !selected && (
        <div style={{background:"var(--surface2)",borderRadius:9,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
          {filtered.slice(0,20).map(e => (
            <div key={e.id} onClick={() => { setSelected(e); setSearch(e.name); }}
              style={{padding:"10px 14px",cursor:"pointer",fontSize:15,fontWeight:600,borderBottom:"1px solid var(--border)"}}>
              {e.name}
            </div>
          ))}
        </div>
      )}
      {selected && (
        <div style={{marginTop:2}}>
          {histLoading && <div style={{fontSize:13,color:"var(--muted)",padding:"6px 2px"}}>Checking history…</div>}
          {!histLoading && history.length === 0 && (
            <div style={{fontSize:13,color:"var(--muted)",padding:"6px 2px",display:"flex",alignItems:"center",gap:6}}>
              <span style={{opacity:.5}}>○</span> No prior history
            </div>
          )}
          {!histLoading && history.length > 0 && (
            <div style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:9,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:"var(--green)",padding:"8px 12px 4px"}}>
                {history.length} prior {history.length===1?"entry":"entries"}
              </div>
              {history.map((h,i) => (
                <div key={i} style={{padding:"7px 12px 9px",borderTop:i>0?"1px solid var(--green-border)":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{h.exercises?.name}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>{new Date(h.log_date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                  </div>
                  <div style={{fontSize:13,color:"var(--text2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{h.log_text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="add-ex-actions">
        <button className="btn btn-ghost" onClick={() => { setOpen(false); setSearch(""); setSelected(null); setHistory([]); }}>Cancel</button>
        <button className="btn btn-primary" onClick={handleAdd} disabled={saving||!selected}>
          {saving?"Adding...":"Add"}
        </button>
      </div>
    </div>
  );
}

function TodayTab({ selectedDate, todayStr }) {
  const dayName = DAY_NAMES[selectedDate.getDay()];
  const dateStr = toDateStr(selectedDate);
  const [schedule, setSchedule] = useState([]);
  const [extraLogs, setExtraLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refresh, setRefresh] = useState(0);

  useEffect(() => {
    setLoading(true);
    Promise.all([
      fetchScheduleForDay(dayName),
      fetchLogsForDate(dateStr),
    ]).then(([sched, logs]) => {
      setSchedule(sched);
      const planIds = new Set(sched.map(s => s.exercise_id));
      // Extra logs = logged today but not in the plan
      const seen = new Set();
      const extras = [];
      for (const l of logs) {
        if (!planIds.has(l.exercise_id) && !seen.has(l.exercise_id) && l.log_text.trim()) {
          seen.add(l.exercise_id);
          extras.push(l);
        }
      }
      setExtraLogs(extras);
    }).catch(console.error).finally(() => setLoading(false));
  }, [dayName, dateStr, refresh]);

  const sectionByExId = {};
  schedule.forEach(s => { sectionByExId[s.exercise_id] = s.section || "Main Session"; });

  const allSections = [...new Set([
    ...schedule.map(s => s.section || "Main Session"),
    ...extraLogs.map(l => sectionByExId[l.exercise_id] || "Main Session")
  ])].sort((a,b) => SECTION_ORDER.indexOf(a) - SECTION_ORDER.indexOf(b));

  const extraBySection = {};
  extraLogs.forEach(l => {
    const sec = sectionByExId[l.exercise_id] || "Main Session";
    if (!extraBySection[sec]) extraBySection[sec] = [];
    extraBySection[sec].push(l);
  });

  const sessionName = SESSION_NAMES[dayName] || dayName;

  return (
    <>
      {schedule.length > 0 && (
        <div className="session-header">
          <div className="session-day-label">{selectedDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
          <div className="session-name">{sessionName}</div>
          <div className="session-count">{schedule.length} exercises</div>
        </div>
      )}
      <div className="content">
        {loading && <div className="center-msg"><div className="spinner"/><div className="center-sub">Loading...</div></div>}
        {!loading && schedule.length === 0 && extraLogs.length === 0 && (
          <div className="center-msg">
            <div className="center-icon">🌿</div>
            <div className="center-title">Rest Day</div>
            <div className="center-sub">No session scheduled.<br/>Rest, recover, come back stronger.</div>
          </div>
        )}
        {!loading && allSections.map(section => {
          const planItems = schedule.filter(s => (s.section||"Main Session") === section);
          const extras = extraBySection[section] || [];
          if (planItems.length === 0 && extras.length === 0) return null;
          return (
            <div key={section}>
              <div className="section-label">{section}</div>
              {planItems.map(s => <ExerciseRow key={s.id} item={s} date={dateStr}/>)}
              {extras.map(l => (
                <ExerciseRow key={l.exercise_id} item={{
                  id: l.id, exercise_id: l.exercise_id,
                  exercises: l.exercises, section, prescription: null
                }} date={dateStr}/>
              ))}
            </div>
          );
        })}
        {!loading && <AddExercise date={dateStr} onAdded={() => setRefresh(r=>r+1)}/>}
      </div>
    </>
  );
}

function HistoryTab() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchRecentLogs(300).then(setLogs).catch(console.error).finally(() => setLoading(false));
  }, []);

  const filtered = search
    ? logs.filter(l => (l.exercises?.name||"").toLowerCase().includes(search.toLowerCase()))
    : logs;

function PlanExRow({ item, allForDay, onRefresh }) {
  const [editing, setEditing] = useState(false);
  const [prescription, setPrescription] = useState(item.prescription || "");
  const [section, setSection] = useState(item.section || "Main Session");
  const [saving, setSaving] = useState(false);
  const name = item.exercises?.name || "Unknown";

  const handleSave = async () => {
    setSaving(true);
    try {
      await Promise.all([
        updateScheduleField(item.id, "prescription", prescription || null),
        updateScheduleField(item.id, "section", section),
      ]);
      setEditing(false); onRefresh();
    } catch(e) { console.error(e); }
    setSaving(false);
  };

  const handleDelete = async () => {
    if (!confirm(`Remove "${name}" from this day?`)) return;
    try { await deleteScheduleRow(item.id); onRefresh(); } catch(e) { console.error(e); }
  };

  const handleMove = async (dir) => {
    try { await moveScheduleRow(item.id, dir, allForDay); onRefresh(); } catch(e) { console.error(e); }
  };

  return (
    <div className="plan-ex-row">
      <div className="plan-ex-header">
        <div className="plan-ex-order">{item.order_in_session}</div>
        <div className="plan-ex-info">
          <div className="plan-ex-name">{name}</div>
          <div className="plan-ex-meta">
            <span style={{fontSize:11,fontWeight:700,letterSpacing:".5px",textTransform:"uppercase",color:"var(--muted)",marginRight:6}}>{section}</span>
            {prescription || <span style={{color:"var(--border)"}}>No prescription</span>}
          </div>
        </div>
        <div className="plan-ex-actions">
          <button className="plan-icon-btn" onClick={()=>handleMove("up")}>↑</button>
          <button className="plan-icon-btn" onClick={()=>handleMove("down")}>↓</button>
          <button className="plan-icon-btn" onClick={()=>setEditing(e=>!e)}>✏️</button>
          <button className="plan-icon-btn danger" onClick={handleDelete}>✕</button>
        </div>
      </div>
      {editing && (
        <div className="plan-edit-form">
          <div className="plan-field">
            <div className="plan-field-label">Section</div>
            <select className="plan-field-input" value={section} onChange={e=>setSection(e.target.value)}>
              {SECTION_ORDER.map(s => <option key={s}>{s}</option>)}

        </div>
      )}
    </div>
  );
}

                </div>
              )}
              <div className="week-nav">
                <button className="week-nav-btn" onClick={()=>setWeekOffset(o=>o-1)}>‹</button>
                <button className="week-nav-btn" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
              </div>
            </div>
          </div>
          <div className="days-row">
            {weekDates.map((date,i) => {
              const dStr = toDateStr(date);
              const isToday = dStr===todayStr;
              const isSel = dStr===toDateStr(selectedDate);
              return (
                <button key={i} className={`day-btn${isToday?" today":""}${isSel?" selected":""}`}
                  onClick={()=>{ setSelectedDate(date); setTab("today"); }}>
                  <div className="day-name">{DAY_SHORT[date.getDay()]}</div>
                  <div className="day-num">{date.getDate()}</div>
                  {isSel && <div className="day-active-bar"/>}
                </button>
              );
            })}
          </div>
        </div>

        {tab==="today" && <TodayTab selectedDate={selectedDate} todayStr={todayStr}/>}
        {tab==="history" && <HistoryTab/>}
        {tab==="races" && <RacesTab/>}
        {tab==="plan" && <PlanTab phase={phase} setPhase={setPhase}/>}

        <div className="bottom-nav">
          {TABS.map(({id,icon,label}) => (
            <button key={id} className={`nav-item${tab===id?" active":""}`} onClick={()=>setTab(id)}>
              <span className="nav-icon">{icon}</span>
              <span className="nav-label">{label}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
