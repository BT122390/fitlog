const db = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: options.prefer || "return=representation",
      ...options.headers,
    },
    ...options,
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_SHORT  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function getWeekDates(anchor) {
  const d = new Date(anchor);
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((d.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{
    const dd = new Date(mon);
    dd.setDate(mon.getDate()+i);
    return dd;
  });
}

function daysUntil(dateStr) {
  const target = new Date(dateStr+"T12:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((target-today)/(1000*60*60*24));
}

async function fetchWorkoutsForDay(dayName) {
  return await db(
    `workouts?day_of_week=eq.${dayName}&select=*,exercises(name,result_type)&order=order_in_session.asc`
  ) || [];
}

async function fetchLastEntry(exerciseName, beforeDate) {
  // Find most recent free-text log for this exercise before the given date
  const results = await db(
    `free_logs?exercise_name=eq.${encodeURIComponent(exerciseName)}&log_date=lt.${beforeDate}&select=*&order=log_date.desc&limit=1`
  );
  return results?.[0] || null;
}

async function fetchTodayEntry(exerciseName, date) {
  const results = await db(
    `free_logs?exercise_name=eq.${encodeURIComponent(exerciseName)}&log_date=eq.${date}&select=*&limit=1`
  );
  return results?.[0] || null;
}

async function saveEntry(exerciseName, date, text, existingId) {
  if (!text.trim()) return;
  if (existingId) {
    await db(`free_logs?id=eq.${existingId}`, {
      method: "PATCH",
      body: JSON.stringify({ log_text: text }),
      prefer: "return=minimal",
    });
  } else {
    await db(`free_logs`, {
      method: "POST",
      body: JSON.stringify({
        exercise_name: exerciseName,
        log_date: date,
        log_text: text,
      }),
    });
  }
}

async function fetchRaces() {
  return await db(`races?order=race_date.asc&select=*`) || [];
}

async function fetchRecentLogs(limit = 200) {
  return await db(
    `free_logs?select=*&order=log_date.desc&limit=${limit}`
  ) || [];
}

// ─── EXERCISE ROW ─────────────────────────────────────────────────────────────

function ExerciseRow({ workout, date, phase }) {
  const exercise = workout.exercises || {};
  const name = exercise.name || workout.notes || "Exercise";

  // Build prescription from current phase
  const phaseMap = { "Phase 1":"p1","Phase 2 Bridge":"p2b","Phase 2 - Build":"p2","Phase 3 - Peak":"p3","Pre-Race Taper":"taper" };
  const prefix = phaseMap[phase] || "p1";
  const sets = workout[`${prefix}_sets`];
  const reps = workout[`${prefix}_reps`];
  const load = workout[`${prefix}_load`];
  const rx = sets && reps ? `${sets} × ${reps}${load ? ` · ${load}` : ""}` : reps || "";

  const [text, setText] = useState("");
  const [lastEntry, setLastEntry] = useState(null);
  const [entryId, setEntryId] = useState(null);
  const [saved, setSaved] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    // Load today's entry and last entry
    Promise.all([
      fetchTodayEntry(name, date),
      fetchLastEntry(name, date),
    ]).then(([today, last]) => {
      if (today) { setText(today.log_text); setEntryId(today.id); setSaved(true); }
      if (last) setLastEntry(last);
    }).catch(console.error);
  }, [name, date]);

  const handleChange = (val) => {
    setText(val);
    setSaved(false);
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      if (!val.trim()) return;
      try {
        if (entryId) {
          await saveEntry(name, date, val, entryId);
        } else {
          const result = await db(`free_logs`, {
            method: "POST",
            body: JSON.stringify({ exercise_name: name, log_date: date, log_text: val }),
          });
          const row = Array.isArray(result) ? result[0] : result;
          if (row?.id) setEntryId(row.id);
        }
        setSaved(true);
      } catch(e) { console.error(e); }
    }, 800);
  };

  return (
    <div className="ex-row">
      <div className="ex-row-name">{name}</div>
      {rx && <div className="ex-row-rx">{rx}</div>}

      {lastEntry && (
        <div style={{marginBottom:10}}>
          <div className="ex-last-label">Last time · {new Date(lastEntry.log_date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
          <div className="ex-last-text">{lastEntry.log_text}</div>
        </div>
      )}

      <div className="ex-this-label">This time{saved && text ? " ✓" : ""}</div>
      <textarea
        className={`ex-textarea${saved && text ? " saved" : ""}`}
        placeholder="e.g. Set 1: 10 / Set 2: 8 / Set 3: 7"
        value={text}
        onChange={e => handleChange(e.target.value)}
        rows={3}
      />
    </div>
  );
}

// ─── ADD EXERCISE ─────────────────────────────────────────────────────────────

function AddExercise({ date, onAdded }) {
  const [open, setOpen] = useState(false);
  const [name, setName] = useState("");
  const [text, setText] = useState("");
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    if (!name.trim()) return;
    setSaving(true);
    try {
      await db(`free_logs`, {
        method: "POST",
        body: JSON.stringify({ exercise_name: name.trim(), log_date: date, log_text: text.trim() }),
      });
      setName(""); setText(""); setOpen(false);
      onAdded();
    } catch(e) { console.error(e); }
    setSaving(false);
  };

  if (!open) return (
    <button className="add-ex-btn" onClick={() => setOpen(true)}>
      + Add exercise
    </button>
  );

  return (
    <div className="add-ex-form">
      <input
        className="add-ex-input"
        placeholder="Exercise name"
        value={name}
        onChange={e => setName(e.target.value)}
        autoFocus
      />
      <textarea
        className="ex-textarea"
        placeholder="Results..."
        value={text}
        onChange={e => setText(e.target.value)}
        rows={3}
      />
      <div className="add-ex-actions">
        <button className="btn btn-ghost" onClick={() => setOpen(false)}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave} disabled={saving || !name.trim()}>
          {saving ? "Saving..." : "Save"}
        </button>
      </div>
    </div>
  );
}

// ─── TODAY TAB ────────────────────────────────────────────────────────────────

function TodayTab({ selectedDate, todayStr, phase }) {
  const dayName = DAY_NAMES[selectedDate.getDay()];
  const dateStr = toDateStr(selectedDate);
  const [workouts, setWorkouts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refresh, setRefresh] = useState(0);

  useEffect(() => {
    setLoading(true);
    fetchWorkoutsForDay(dayName)
      .then(setWorkouts)
      .catch(console.error)
      .finally(() => setLoading(false));
  }, [dayName]);

  const sections = [...new Set(workouts.map(w => w.section || "Main Work"))];
  const sectionOrder = ["Pre-Session Mobility","Warm-Up","Main Work","Accessory","Finisher","Post-Session"];
  sections.sort((a,b) => sectionOrder.indexOf(a) - sectionOrder.indexOf(b));

  return (
    <>
      {workouts.length > 0 && (
        <div className="session-header">
          <div className="session-day-label">
            {selectedDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
          </div>
          <div className="session-name">{workouts[0]?.session_name || dayName}</div>
          <div className="session-count">{workouts.length} exercises · {phase}</div>
        </div>
      )}

      <div className="content">
        {loading && <div className="center-msg"><div className="spinner"/><div className="center-sub">Loading...</div></div>}

        {!loading && workouts.length === 0 && (
          <div className="center-msg">
            <div className="center-icon">🌿</div>
            <div className="center-title">Rest Day</div>
            <div className="center-sub">No session scheduled.<br/>Rest, recover, come back stronger.</div>
          </div>
        )}

        {!loading && sections.map(section => (
          <div key={section}>
            <div className="section-label">{section}</div>
            {workouts.filter(w => (w.section||"Main Work") === section).map(w => (
              <ExerciseRow key={w.id} workout={w} date={dateStr} phase={phase}/>
            ))}
          </div>
        ))}

        {!loading && (
          <AddExercise date={dateStr} onAdded={() => setRefresh(r => r+1)}/>
        )}
      </div>
    </>
  );
}

  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");

  useEffect(() => {
    fetchRecentLogs(300).then(setLogs).catch(console.error).finally(() => setLoading(false));
  }, []);

  const filtered = search
    ? logs.filter(l => l.exercise_name.toLowerCase().includes(search.toLowerCase()))
    : logs;

  // Group by date
  const byDate = {};
  for (const l of filtered) {
    if (!byDate[l.log_date]) byDate[l.log_date] = [];
    byDate[l.log_date].push(l);
  }
  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

  return (
    <div className="content" style={{paddingTop:12}}>
      <input
        className="search-input"
        placeholder="Search exercises..."
        value={search}
        onChange={e => setSearch(e.target.value)}
      />
      {loading && <div className="center-msg"><div className="spinner"/></div>}
      {!loading && dates.length === 0 && (
        <div className="center-msg">
          <div className="center-icon">📋</div>
          <div className="center-title">No history yet</div>
          <div className="center-sub">Log your first workout to see it here.</div>
        </div>
      )}
      {dates.map(date => (
        <div className="hist-date-group" key={date}>
          <div className="hist-date-label">
            {new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}
          </div>
          {byDate[date].map(l => (
            <div className="hist-entry" key={l.id}>
              <div className="hist-entry-name">{l.exercise_name}</div>
              <div className="hist-entry-text">{l.log_text}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── RACES TAB ────────────────────────────────────────────────────────────────

function RacesTab() {
  const [races, setRaces] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchRaces().then(setRaces).catch(console.error).finally(() => setLoading(false));
  }, []);

  const upcoming = races.filter(r => daysUntil(r.race_date) > 0).sort((a,b) => new Date(a.race_date)-new Date(b.race_date));
  const past = races.filter(r => daysUntil(r.race_date) <= 0).sort((a,b) => new Date(b.race_date)-new Date(a.race_date));

  const pillClass = t => t==="anchor"?"pill-anchor":t==="target"?"pill-target":"pill-training";
  const pillLabel = t => t==="anchor"?"A Race":t==="target"?"B Race":"Training";

  return (
    <div className="content" style={{paddingTop:12}}>
      {loading && <div className="center-msg"><div className="spinner"/></div>}
      {upcoming.length > 0 && <>
        <div className="section-label">Upcoming</div>
        {upcoming.map(r => (
          <div className="race-card" key={r.id}>
            <div>
              <div className="race-name">{r.name}</div>
              <div className="race-meta">
                {new Date(r.race_date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
                {r.distance_miles ? ` · ${r.distance_miles} mi` : ""}
              </div>
              <div className={`race-type-pill ${pillClass(r.race_type)}`}>{pillLabel(r.race_type)}</div>
            </div>
            <div className="race-countdown">
              <div className="race-days">{daysUntil(r.race_date)}</div>
              <div className="race-days-label">days out</div>
            </div>
          </div>
        ))}
      </>}
      {past.length > 0 && <>
        <div className="section-label" style={{marginTop:8}}>Past</div>
        {past.map(r => (
          <div className="race-card" key={r.id} style={{opacity:.55}}>
            <div>
              <div className="race-name">{r.name}</div>
              <div className="race-meta">
                {new Date(r.race_date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
                {r.distance_miles ? ` · ${r.distance_miles} mi` : ""}
              </div>
              <div className={`race-type-pill ${pillClass(r.race_type)}`}>{pillLabel(r.race_type)}</div>
            </div>
          </div>
        ))}
      </>}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const today = new Date();
  const todayStr = toDateStr(today);

  const [tab, setTab] = useState("today");
  const [selectedDate, setSelectedDate] = useState(today);
  const [weekOffset, setWeekOffset] = useState(0);
  const phase = "Phase 1";

  const anchor = new Date(today);
  anchor.setDate(today.getDate() + weekOffset * 7);
  const weekDates = getWeekDates(anchor);

  const weekLabel = weekOffset===0?"This Week":weekOffset===-1?"Last Week":weekOffset===1?"Next Week":
    weekDates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"});

  const TABS = [
    {id:"today", icon:"🏋️", label:"Today"},
    {id:"history", icon:"📋", label:"History"},
    {id:"races", icon:"🏁", label:"Races"},
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        {/* WEEK STRIP */}
        <div className="week-strip">
          <div className="week-strip-top">
            <div className="week-label">{weekLabel}</div>
            <div className="week-nav">
              <button className="week-nav-btn" onClick={() => setWeekOffset(o => o-1)}>‹</button>
              <button className="week-nav-btn" onClick={() => setWeekOffset(o => o+1)}>›</button>
            </div>
          </div>
          <div className="days-row">
            {weekDates.map((date, i) => {
              const dStr = toDateStr(date);
              const isToday = dStr === todayStr;
              const isSel = dStr === toDateStr(selectedDate);
              return (
                <button key={i}
                  className={`day-btn${isToday?" today":""}${isSel?" selected":""}`}
                  onClick={() => { setSelectedDate(date); setTab("today"); }}>
                  <div className="day-name">{DAY_SHORT[date.getDay()]}</div>
                  <div className="day-num">{date.getDate()}</div>
                  {isSel && <div className="day-active-bar"/>}
                </button>
              );
            })}
          </div>
        </div>

        {/* CONTENT */}
        {tab==="today" && <TodayTab selectedDate={selectedDate} todayStr={todayStr} phase={phase}/>}
        {tab==="history" && <HistoryTab/>}
        {tab==="races" && <RacesTab/>}

        {/* BOTTOM NAV */}
        <div className="bottom-nav">
          {TABS.map(({id,icon,label}) => (
            <button key={id}
              className={`nav-item${tab===id?" active":""}`}
              onClick={() => setTab(id)}>
              <span className="nav-icon">{icon}</span>
              <span className="nav-label">{label}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
